<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reader | Gain Blueprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { screens: { sm: "0px", md: "0px", lg: "0px", xl: "0px", "2xl": "0px" } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        body { background-color: #090a09; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* SECURITY - ANTI COPY */
        .premium-content {
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        .premium-content img {
            pointer-events: none;
            -webkit-user-drag: none;
        }
        
        /* SECURITY - NO PRINT */
        @media print {
            body { display: none !important; }
        }

        .prose h1, .prose h2, .prose h3 { font-family: 'Outfit', sans-serif; color: #fff; font-weight: 800; margin-top: 2em; margin-bottom: 0.5em; }
        .prose h1 { font-size: 2.5rem; letter-spacing: -0.025em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5em; }
        .prose h2 { font-size: 1.8rem; color: #4be277; }
        .prose p { margin-bottom: 1.5em; line-height: 1.8; color: #cbd5e1; }
        .prose ul, .prose ol { margin-bottom: 1.5em; padding-left: 1.5em; }
        .prose li { margin-bottom: 0.5em; line-height: 1.6; }
        .prose strong { color: #fff; }
        .prose blockquote { border-left: 4px solid #4be277; padding-left: 1em; margin-left: 0; color: #94a3b8; font-style: italic; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4be277; }</style>
</head>
<body class="premium-content h-screen flex flex-col">

    <!-- Navbar -->
    <header class="w-full bg-[#121912] border-b border-white/10 flex-shrink-0 z-50">
        <div class="px-6 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2 text-sm font-bold font-['Outfit']">
                    <span class="material-symbols-outlined text-base">arrow_back</span> Dashboard
                </a>
            </div>
            <div class="flex items-center gap-4">
                <span id="reading-progress" class="text-xs font-bold text-gray-500 uppercase tracking-widest font-['Outfit']">Chapter 1 of 15</span>
                <button onclick="toggleBookmark()" class="text-gray-400 hover:text-yellow-400 transition-colors">
                    <span id="bm-icon" class="material-symbols-outlined">bookmark_border</span>
                </button>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto relative scroll-smooth" id="reader-scroll">
            <div class="max-w-3xl mx-auto px-8 py-16">
                <div id="content-area" class="prose max-w-none">
                    <div class="text-center py-20 text-gray-600 flex flex-col items-center">
                        <span class="material-symbols-outlined animate-spin text-4xl mb-4 text-[#4be277]">autorenew</span>
                        <p class="font-['Outfit'] uppercase tracking-widest text-xs font-bold">Decrypting Chapter...</p>
                    </div>
                </div>
                
                <!-- Navigation Footer -->
                <div class="mt-20 pt-8 border-t border-white/10 flex justify-between items-center font-['Outfit'] pb-20">
                    <button id="btn-prev" onclick="navChapter(-1)" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors font-bold disabled:opacity-30 disabled:hover:text-gray-400">
                        <span class="material-symbols-outlined text-sm">arrow_back</span> Previous
                    </button>
                    <button id="btn-next" onclick="navChapter(1)" class="flex items-center gap-2 bg-white text-black px-6 py-3 rounded-full font-bold hover:bg-gray-200 transition-colors">
                        Next Chapter <span class="material-symbols-outlined text-sm">arrow_forward</span>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentChapter = 1;
        const totalChapters = 15; // Should be dynamic based on API, hardcoded for UI brevity

        async function loadChapter() {
            const urlParams = new URLSearchParams(window.location.search);
            currentChapter = parseInt(urlParams.get('ch')) || 1;
            
            document.getElementById('reading-progress').textContent = `Chapter ${currentChapter} of ${totalChapters}`;
            document.getElementById('btn-prev').disabled = currentChapter === 1;
            document.getElementById('btn-next').innerHTML = currentChapter === totalChapters ? 
                'Finish Book <span class="material-symbols-outlined text-sm">check</span>' : 
                'Next Chapter <span class="material-symbols-outlined text-sm">arrow_forward</span>';

            try {
                const res = await fetch(`/api/content/chapter/${currentChapter}`);
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/login.html';
                    return;
                }
                const html = await res.text();
                
                // Inject the raw HTML which already contains the server-side watermark
                document.getElementById('content-area').innerHTML = html;
                document.getElementById('reader-scroll').scrollTop = 0;
            } catch (err) {
                document.getElementById('content-area').innerHTML = '<p class="text-red-400 text-center py-20">Failed to load content. Ensure you are connected to the internet.</p>';
            }
        }

        function navChapter(dir) {
            const next = currentChapter + dir;
            if (next >= 1 && next <= totalChapters) {
                window.location.href = `reader.html?ch=${next}`;
            } else if (next > totalChapters) {
                window.location.href = 'dashboard.html';
            }
        }

        async function toggleBookmark() {
            const icon = document.getElementById('bm-icon');
            const isBookmarked = icon.textContent === 'bookmark';
            icon.textContent = isBookmarked ? 'bookmark_border' : 'bookmark';
            icon.style.fontVariationSettings = isBookmarked ? "'FILL' 0" : "'FILL' 1";
            icon.classList.toggle('text-yellow-400', !isBookmarked);
            
            // Just a visual toggle here for speed, actual save handled by dashboard load or explicit API
            await fetch('/api/content/progress', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ toggleBookmark: currentChapter })
            });
        }

        // --- SECURITY PROTECTIONS ---
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            const blockedKeys = ['c', 'p', 's', 'a', 'u'];
            if ((e.ctrlKey || e.metaKey) && blockedKeys.includes(e.key.toLowerCase())) {
                e.preventDefault();
            }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['i', 'j', 'c'].includes(e.key.toLowerCase()))) {
                e.preventDefault();
            }
        });
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('cut', e => e.preventDefault());

        // Blur content if window loses focus
        window.addEventListener('blur', () => {
            document.body.style.filter = 'blur(10px)';
            document.body.style.opacity = '0.5';
        });
        window.addEventListener('focus', () => {
            document.body.style.filter = 'none';
            document.body.style.opacity = '1';
        });

        window.onload = loadChapter;
    </script>
</body>
</html>
