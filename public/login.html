<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Premium Member</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { screens: { sm: "0px", md: "0px", lg: "0px", xl: "0px", "2xl": "0px" } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        body { background-color: #0e150e; color: #dce5d9; font-family: 'Outfit', sans-serif; }
        .glass-card { background: rgba(24, 24, 24, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .emerald-glow { box-shadow: 0 0 15px 2px rgba(75, 226, 119, 0.2); }
        .text-primary { color: #4be277; }
        .bg-primary { background-color: #4be277; }
        .text-on-primary { color: #091009; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[url('assets/images/hero-bg.jpg')] bg-cover bg-center">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
    
    <div class="glass-card w-full max-w-md p-8 rounded-2xl relative z-10">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black uppercase tracking-tighter text-white mb-2">Gain Blueprint</h1>
            <p class="text-gray-400 text-sm">Premium Member Login</p>
        </div>

        <div id="error-msg" class="hidden mb-6 p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-lg text-center"></div>
        <div id="success-msg" class="hidden mb-6 p-3 bg-primary/10 border border-primary/20 text-primary text-sm rounded-lg text-center"></div>

        <!-- Step 1: Phone -->
        <div id="step-phone">
            <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2 font-bold">Mobile Number</label>
            <div class="flex gap-2 mb-6">
                <input type="text" value="+91" disabled class="w-16 bg-white/5 border border-white/10 rounded-xl px-3 text-center text-white" />
                <input type="tel" id="phone" placeholder="6282253984" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary transition-colors" />
            </div>
            <button onclick="requestOTP()" id="btn-request" class="w-full py-4 bg-primary text-on-primary font-bold rounded-xl hover:scale-[0.98] transition-transform emerald-glow flex justify-center items-center gap-2">
                Send OTP <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>

        <!-- Step 2: OTP -->
        <div id="step-otp" class="hidden">
            <p class="text-sm text-gray-400 mb-6 text-center">We've sent a 6-digit code to <br><strong id="display-phone" class="text-white"></strong></p>
            <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2 font-bold text-center">Enter OTP</label>
            <input type="text" id="otp" placeholder="••••••" maxlength="6" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-4 text-center text-2xl tracking-[0.5em] text-white focus:outline-none focus:border-primary transition-colors mb-6" />
            
            <button onclick="verifyOTP()" id="btn-verify" class="w-full py-4 bg-primary text-on-primary font-bold rounded-xl hover:scale-[0.98] transition-transform emerald-glow mb-4">
                Verify & Login
            </button>
            <button onclick="resetFlow()" class="w-full text-xs text-gray-500 hover:text-white transition-colors">Change Number</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'session_ended') {
            const errDiv = document.getElementById('error-msg');
            errDiv.textContent = "Your session was ended because your account logged in from another device.";
            errDiv.classList.remove('hidden');
        }

        async function requestOTP() {
            const phone = document.getElementById('phone').value;
            if (phone.length < 10) return alert('Enter a valid phone number');
            
            const btn = document.getElementById('btn-request');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">autorenew</span>';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/request-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('error-msg').classList.add('hidden');
                    document.getElementById('step-phone').classList.add('hidden');
                    document.getElementById('step-otp').classList.remove('hidden');
                    document.getElementById('display-phone').textContent = phone;
                    if (data.devOtp) { document.getElementById('display-phone').textContent += ' (OTP: ' + data.devOtp + ')'; }
                } else {
                    document.getElementById('error-msg').textContent = data.message;
                    document.getElementById('error-msg').classList.remove('hidden');
                }
            } catch (err) {
                alert('Something went wrong');
            } finally {
                btn.innerHTML = 'Send OTP <span class="material-symbols-outlined">arrow_forward</span>';
                btn.disabled = false;
            }
        }

        async function verifyOTP() {
            const phone = document.getElementById('phone').value;
            const otp = document.getElementById('otp').value;
            if (otp.length !== 6) return alert('Enter 6 digit OTP');

            const btn = document.getElementById('btn-verify');
            btn.innerHTML = 'Verifying...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, otp })
                });
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    document.getElementById('error-msg').textContent = data.message;
                    document.getElementById('error-msg').classList.remove('hidden');
                    btn.innerHTML = 'Verify & Login';
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Something went wrong');
                btn.innerHTML = 'Verify & Login';
                btn.disabled = false;
            }
        }

        function resetFlow() {
            document.getElementById('step-otp').classList.add('hidden');
            document.getElementById('step-phone').classList.remove('hidden');
            document.getElementById('otp').value = '';
            document.getElementById('error-msg').classList.add('hidden');
        }
    </script>
</body>
</html>
