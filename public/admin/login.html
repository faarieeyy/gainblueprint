<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Gain Blueprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0e150e; color: #fff; font-family: 'Outfit', sans-serif; }
        .glass-card { background: rgba(24, 24, 24, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass-card w-full max-w-sm p-8 rounded-2xl">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black uppercase tracking-tighter text-white mb-1">Admin Portal</h1>
            <p class="text-gray-400 text-sm">Secure Access</p>
        </div>
        
        <div id="error-msg" class="hidden mb-6 p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-lg text-center"></div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2 font-bold">Admin Phone</label>
                <input type="tel" id="phone" placeholder="6282253984" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#4be277]" />
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-gray-500 mb-2 font-bold">6-Digit PIN</label>
                <input type="password" id="pin" placeholder="••••••" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#4be277]" />
            </div>
            <button onclick="verifyAdmin()" id="btn-verify" class="w-full py-4 mt-4 bg-[#4be277] text-black font-bold rounded-xl hover:bg-[#3dcd64] transition-colors">
                Login to Admin
            </button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'session_ended') {
            const errDiv = document.getElementById('error-msg');
            errDiv.textContent = "Your session was ended.";
            errDiv.classList.remove('hidden');
        }

        async function verifyAdmin() {
            const phone = document.getElementById('phone').value;
            const pin = document.getElementById('pin').value;
            const btn = document.getElementById('btn-verify');
            
            btn.innerHTML = 'Verifying...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/admin/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, pin })
                });
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    document.getElementById('error-msg').textContent = data.message;
                    document.getElementById('error-msg').classList.remove('hidden');
                    btn.innerHTML = 'Login to Admin';
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Something went wrong');
                btn.innerHTML = 'Login to Admin';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
