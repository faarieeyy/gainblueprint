<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Gain Blueprint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0e150e; color: #dce5d9; font-family: 'Outfit', sans-serif; }
        .glass-card { background: rgba(24, 24, 24, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-primary { color: #4be277; }
        .bg-primary { background-color: #4be277; }
        th { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #9ca3af; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen">
    <header class="w-full bg-[#121912] border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-xl font-black uppercase tracking-tighter text-white">ADMIN PORTAL</div>
            <button onclick="logout()" class="text-sm text-gray-400 hover:text-white transition-colors">Logout</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-4 gap-6 mb-12">
            <div class="glass-card p-6 rounded-xl"><p class="text-xs text-gray-400 uppercase font-bold">Total Users</p><p id="stat-total" class="text-3xl font-black text-white">0</p></div>
            <div class="glass-card p-6 rounded-xl"><p class="text-xs text-gray-400 uppercase font-bold">Active Sessions</p><p id="stat-sessions" class="text-3xl font-black text-primary">0</p></div>
        </div>

        <div class="glass-card rounded-2xl overflow-hidden">
            <div class="p-6 border-b border-white/10 flex justify-between items-center">
                <h2 class="text-lg font-bold text-white">Premium Users</h2>
                <button onclick="document.getElementById('add-user-modal').classList.remove('hidden')" class="bg-primary text-black px-4 py-2 rounded-lg font-bold text-sm">Add New User</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead><tr><th>ID</th><th>Name</th><th>Phone</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead>
                    <tbody id="users-table"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Add User Modal -->
    <div id="add-user-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="glass-card p-8 rounded-2xl w-full max-w-md bg-[#121912]">
            <h3 class="text-xl font-bold text-white mb-6">Create Premium User</h3>
            <div class="space-y-4">
                <input type="text" id="new-name" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white" />
                <input type="tel" id="new-phone" placeholder="Phone Number" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white" />
                <div class="flex gap-4 mt-6">
                    <button onclick="document.getElementById('add-user-modal').classList.add('hidden')" class="flex-1 py-3 bg-white/5 text-white rounded-xl">Cancel</button>
                    <button onclick="createUser()" class="flex-1 py-3 bg-primary text-black font-bold rounded-xl">Create</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/admin/users');
                if (res.status === 401) return window.location.href = '/admin/login.html';
                const data = await res.json();
                
                const sRes = await fetch('/api/admin/stats');
                const sData = await sRes.json();
                
                if (data.success) {
                    document.getElementById('stat-total').textContent = sData.stats.totalUsers;
                    document.getElementById('stat-sessions').textContent = sData.stats.activeSessions;
                    
                    const tbody = document.getElementById('users-table');
                    tbody.innerHTML = '';
                    data.users.forEach(u => {
                        tbody.innerHTML += `
                            <tr>
                                <td class="font-bold text-primary">${u.id}</td>
                                <td class="text-white">${u.name}</td>
                                <td>${u.phone}</td>
                                <td><span class="px-2 py-1 rounded-full text-[10px] uppercase font-bold ${u.status === 'Active' ? 'bg-[#25D366]/20 text-[#25D366]' : 'bg-red-500/20 text-red-500'}">${u.status}</span></td>
                                <td>${u.lastLogin ? new Date(u.lastLogin).toLocaleString() : 'Never'}</td>
                                <td>
                                    <button onclick="deleteUser('${u.id}')" class="text-red-400 hover:text-red-300 text-xs font-bold mr-3">Delete</button>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (err) { console.error(err); }
        }

        async function createUser() {
            const name = document.getElementById('new-name').value;
            const phone = document.getElementById('new-phone').value;
            if (!name || !phone) return alert('Fill all fields');
            
            const res = await fetch('/api/admin/users', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, phone })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('add-user-modal').classList.add('hidden');
                document.getElementById('new-name').value = '';
                document.getElementById('new-phone').value = '';
                loadData();
            } else {
                alert(data.message);
            }
        }

        async function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user? This will also end their active session.')) {
                await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
                loadData();
            }
        }

        async function logout() {
            await fetch('/api/auth/admin/logout', { method: 'POST' });
            window.location.href = '/admin/login.html';
        }

        window.onload = loadData;
    </script>
</body>
</html>
